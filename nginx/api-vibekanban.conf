# Vibe Kanban API reverse proxy configuration
# Backend: localhost:8081
# Domain: api.vibekanban.<host-domain>
# WebSocket map defined in /etc/nginx/conf.d/websocket-upgrade.conf

# Upstream definition for the backend
upstream vibekanban_backend {
    server 127.0.0.1:8081;
    keepalive 64;
}

# HTTP server - certbot will add HTTPS configuration
server {
    server_name api.vibekanban.<host-domain>;

    # Logging
    access_log /var/log/nginx/api-vibekanban.access.log;
    error_log /var/log/nginx/api-vibekanban.error.log;

    # Proxy settings for all requests
    location / {
        proxy_pass http://vibekanban_backend;
        proxy_http_version 1.1;

        # WebSocket support (required for Electric SQL real-time sync)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-running connections (WebSockets/SSE)
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;

        # Buffering settings for streaming/SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # Disable response size limits for streaming
        proxy_max_temp_file_size 0;

        # Keep-alive settings
        proxy_socket_keepalive on;
    }

    # Health check endpoint (can have shorter timeouts)
    location = /health {
        proxy_pass http://vibekanban_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.vibekanban.<host-domain>/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.vibekanban.<host-domain>/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = api.vibekanban.<host-domain>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name api.vibekanban.<host-domain>;
    return 404; # managed by Certbot


}