# LANGGRAPH_AUTH_TOKEN: <LANGGRAPH_AUTH_TOKEN>

# --- Bearer token auth check (map goes in http context) ---
map $http_authorization $auth_valid {
    default 0;
    "Bearer <LANGGRAPH_AUTH_TOKEN>" 1;
}

server {
    server_name langgraph.<host-domain>;

    # --- CORS origin ---
    set $cors_origin "https://eu.smith.langchain.com";

    # Health check endpoints — no auth required (Studio pre-check)
    location ~ ^/(info|ok)$ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-auth-scheme, x-tenant-id, x-user-id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        proxy_pass http://127.0.0.1:8123;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strip upstream CORS headers to avoid duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-auth-scheme, x-tenant-id, x-user-id" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    location / {
        default_type application/json;

        # Preflight: return 204 with CORS headers, NO auth check
        # (browsers can't send custom headers on OPTIONS preflight)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-auth-scheme, x-tenant-id, x-user-id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        # --- Bearer token auth — reject if missing or wrong (JSON body for Studio) ---
        if ($auth_valid = 0) {
            return 401 '{"error": "Unauthorized"}';
        }

        proxy_pass http://127.0.0.1:8123;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Strip upstream CORS headers to avoid duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        # CORS headers on proxied responses
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-auth-scheme, x-tenant-id, x-user-id" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/langgraph.<host-domain>/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/langgraph.<host-domain>/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = langgraph.<host-domain>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name langgraph.<host-domain>;
    return 404; # managed by Certbot


}
