server {
    if ($host = coder.<host-domain>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name coder.<host-domain> *.coder.<host-domain>;
    
    location / {
        return 301 https://$host$request_uri;
    }


}

server {
    listen 443 ssl http2;
    server_name coder.<host-domain> *.coder.<host-domain>;
    ssl_certificate /etc/letsencrypt/live/coder.<host-domain>-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/coder.<host-domain>-0001/privkey.pem; # managed by Certbot

    
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }


}
