services:
  paperclip:
    build:
      context: /opt/paperclip/src
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3100:3100"
    environment:
      - HOST=0.0.0.0
      - PORT=3100
      - SERVE_UI=true
      - NODE_ENV=production
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=private
      - PAPERCLIP_PUBLIC_URL=https://paperclip.<host-domain>
      - DATABASE_URL=postgres://paperclip:${POSTGRES_PASSWORD}@paperclip-db:5432/paperclip
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy

  paperclip-db:
    container_name: paperclip-db
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=paperclip
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - /mnt/main/pg_paperclip:/var/lib/postgresql/data

volumes:
  paperclip-data:
