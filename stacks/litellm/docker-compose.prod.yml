name: litellm

services:
  litellm-proxy-1:
    ports: !reset []

  litellm-proxy-2:
    image: ghcr.io/berriai/litellm:v1.83.7-stable
    container_name: litellm-proxy-2
    env_file:
      - .env
    environment:
      DATABASE_URL: ${LITELLM_DATABASE_URL}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4001"]
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health/liveliness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  litellm-nginx:
    image: nginx:alpine
    container_name: litellm-nginx
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - litellm-proxy-1
      - litellm-proxy-2
    restart: unless-stopped
