# llm.<host-domain> — LiteLLM proxy external endpoint
# Served via Cloudflare Tunnel (cloudflared) — ports 80/443 are
# blocked at Hetzner firewall, origin is NOT directly reachable.
#
# SSL cert: Let's Encrypt via DNS-01 challenge (not HTTP-01)
# Cert path: /etc/letsencrypt/live/llm.<host-domain>/
# Expires: 2026-08-02
# Renewal: manual — run certbot certonly --manual --preferred-challenges dns
#          -d llm.<host-domain> and add the TXT record in Cloudflare DNS.

server {
    listen 80;
    server_name llm.<host-domain>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name llm.<host-domain>;

    ssl_certificate /etc/letsencrypt/live/llm.<host-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.<host-domain>/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}
